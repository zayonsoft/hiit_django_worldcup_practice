<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Our Students</title>
    <style>
      body {
        padding: 20px;
      }
      /* Simple styling to add visible borders and spacing */
      table {
        width: 100%;
        border-collapse: collapse; /* Prevents double borders */
      }
      th,
      td {
        border: 2px solid black;
        padding: 8px;
        text-align: center;
      }
      th {
        background-color: #05077d;
        color: whitesmoke;
      }

      .btn-link {
        background-color: blue;
        color: white;
        text-decoration: none;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <h2>Name of Students</h2>
    <h2>Number of Students: {{students.count}}</h2>
    <a class="btn-link" href="/add_students">Add New Student +</a>
    <table>
      <!-- Table Header Row -->
      <tr>
        <th>Matric No</th>
        <th>First Name</th>
        <th>Last Name</th>
        <th>View</th>
      </tr>
      <!-- Table Data Row 1 -->
      {% for student in students %}
      <tr>
        <td>{{student.matric_number}}</td>
        <td>{{student.first_name}}</td>
        <td>{{student.last_name}}</td>
        <td>
          <a class="btn-link" href="/students/{{student.id}}">View student</a>
        </td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
